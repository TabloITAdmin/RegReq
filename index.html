<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby3PFpiWkrdOefg_CqSwujQHQOfJChTytW7u--h5jaI0BVGMRYim-1BCO9Llio906lwig/exec";

  function generateEmail(first, last) {
    return (first + last).toLowerCase() + "@trc.local";
  }

  function validate(first, last, password) {
    if (!first || first.includes(" ")) {
      return "First name must be one word only";
    }

    if (!last) {
      return "Last name is required";
    }

    if (password.length < 4 || password.length > 8) {
      return "Password must be 4-8 characters";
    }

    return null;
  }

  async function submitForm() {
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");

    const first = document.getElementById("firstName").value.trim();
    const last = document.getElementById("lastName").value.trim();
    const password = document.getElementById("password").value;

    const error = validate(first, last, password);

    if (error) {
      status.innerHTML = `<span style="color:red">${error}</span>`;
      return;
    }

    const email = generateEmail(first, last);

    btn.disabled = true;
    btn.innerText = "Saving...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          firstName: first,
          lastName: last,
          email: email,
          password: password
        })
      });

      const data = await res.json();

      if (data.status === "success") {
        status.innerHTML = `
          <div style="color:green;">✅ Successfully Registered!</div>
          <div class="success-box">
            Your Email:<br>${email}
          </div>
        `;

        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.getElementById("password").value = "";
      } else {
        status.innerHTML = `<span style="color:red;">Error saving data</span>`;
      }

    } catch (err) {
      console.error(err);
      status.innerHTML = `<span style="color:red;">Network error</span>`;
    }

    btn.disabled = false;
    btn.innerText = "Submit";
  }
</script>
