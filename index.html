<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #3a7bd5, #00d2ff);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #3a7bd5;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #3a7bd5;
      font-size: 16px;
    }

    input:focus {
      border-color: #00d2ff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .success-box {
      background: #e6f7ff;
      border: 1px solid #3a7bd5;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
      color: #2a5fb8;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Register</h2>

  <div class="input-group">
    <input type="text" id="firstName" placeholder="First Name (One word only)">
  </div>

  <div class="input-group">
    <input type="text" id="lastName" placeholder="Last Name">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password (4-8 chars)">
  </div>

  <button id="submitBtn" onclick="submitForm()">Submit</button>

  <div class="status" id="status"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyoahKqToXSShDjBSM4EomqP4BhzHzgn6goHFxoVflRdPAzKR4hAqOp2rp6aAXD5_HfOg/exec";

  function generateEmail(first, last) {
    return (first + last).toLowerCase() + "@trc.local";
  }

  function validate(first, last, password) {
    if (!first || first.includes(" ")) {
      return "First name must be one word only";
    }

    if (!last) {
      return "Last name is required";
    }

    if (password.length < 4 || password.length > 8) {
      return "Password must be 4-8 characters";
    }

    return null;
  }

  async function submitForm() {
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");

    const first = document.getElementById("firstName").value.trim();
    const last = document.getElementById("lastName").value.trim();
    const password = document.getElementById("password").value;

    const error = validate(first, last, password);

    if (error) {
      status.innerHTML = `<span style="color:red">${error}</span>`;
      return;
    }

    const email = generateEmail(first, last);

    btn.disabled = true;
    btn.innerText = "Saving...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          firstName: first,
          lastName: last,
          email: email,
          password: password
        })
      });

      const data = await res.json();

      if (data.status === "success") {
        status.innerHTML = `
          <div style="color:green;">✅ Successfully Registered!</div>
          <div class="success-box">
            Your Email:<br>${email}
          </div>
        `;

        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.getElementById("password").value = "";
      } else {
        status.innerHTML = `<span style="color:red;">${data.message || "Error saving data"}</span>`;
      }

    } catch (err) {
      console.error(err);
      status.innerHTML = `<span style="color:red;">Network error</span>`;
    }

    btn.disabled = false;
    btn.innerText = "Submit";
  }
</script>

</body>
</html>
