<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRC Login Request</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 22, 48, 0.50);
      z-index: -1;
    }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(191, 219, 254, 0.9);
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.20);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
    }

    .form-title {
      text-align: center;
      color: #1d4ed8;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-subtitle {
      text-align: center;
      color: #475569;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 700;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: #f8fbff;
      color: #0f172a;
      font-size: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-group input[readonly] {
      background: #eff6ff;
      color: #334155;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .message {
      min-height: 20px;
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #1e40af;
    }

    @media (max-width: 480px) {
      .form-card {
        padding: 22px 18px;
      }

      .form-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="bg-trc.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <div class="video-overlay"></div>

  <div class="page-wrap">
    <div class="form-card">
      <div class="form-title">Login Request</div>
      <div class="form-subtitle">Fill in your details below</div>

      <form id="testForm">
        <div class="form-group">
          <label for="firstName">First Name (One Name Only)</label>
          <input type="text" id="firstName" required />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" required />
        </div>

        <div class="form-group">
          <label for="email">Email (Auto-Generated)</label>
          <input type="text" id="email" readonly />
        </div>

        <div class="form-group">
          <label for="password">Password (Min 6 Characters)</label>
          <input type="password" id="password" minlength="6" required />
        </div>

        <button type="submit" class="submit-btn">Submit Request</button>
      </form>

      <div class="message" id="msg"></div>
    </div>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby8U9PqJx8vWMb2cev23T3keuJqSoLkjgQdENUnowtILvj6KF6DU-4ReXZx18qYygy9Lg/exec';

    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const form = document.getElementById('testForm');
    const msg = document.getElementById('msg');

    function cleanName(value) {
      return value.replace(/[^a-zA-Z]/g, '').toLowerCase();
    }

    function updateEmail() {
      const firstName = cleanName(firstNameInput.value);
      const lastName = cleanName(lastNameInput.value);

      if (firstName && lastName) {
        emailInput.value = firstName + lastName + '@trc.local';
      } else {
        emailInput.value = '';
      }
    }

    firstNameInput.addEventListener('input', updateEmail);
    lastNameInput.addEventListener('input', updateEmail);

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const firstName = firstNameInput.value.trim();
      const lastName = lastNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!firstName || !lastName || !email || !password) {
        msg.textContent = 'Please complete all fields.';
        return;
      }

      if (password.length < 4 || password.length > 8) {
        msg.textContent = 'Password must be 4 to 8 characters only.';
        return;
      }

      const formData = new FormData();
      formData.append('FIRSTNAME', firstName);
      formData.append('LASTNAME', lastName);
      formData.append('EMAIL', email);
      formData.append('PASSWORD', password);

      msg.textContent = 'Submitting...';

      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.result === 'success') {
          msg.textContent = 'Submitted successfully.';
          form.reset();
          emailInput.value = '';
        } else {
          msg.textContent = 'Error: ' + (result.error || 'Unknown error');
        }
      } catch (error) {
        msg.textContent = 'Fetch error: ' + error.message;
      }
    });
  </script>
</body>
</html>
