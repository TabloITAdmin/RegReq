<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #3a7bd5, #00d2ff);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #3a7bd5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 2px solid #3a7bd5;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .success-box {
      margin-top: 10px;
      padding: 10px;
      background: #e6f7ff;
      border-radius: 8px;
      font-weight: bold;
      color: #2a5fb8;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Register</h2>

  <input type="text" id="firstName" placeholder="First Name (one word)">
  <input type="text" id="lastName" placeholder="Last Name">
  <input type="password" id="password" placeholder="Password (4-8 chars)">

  <button onclick="submitForm()">Submit</button>

  <div class="status" id="status"></div>
</div>

<script>
  // ✅ Your exact new Apps Script Web App URL
  const API_URL = "https://script.google.com/macros/s/AKfycbxlhT8zWCmx7aZxMGetZJUAUIiY5U_AMT83gWCSAb14NWuxPL47E1XnKp7-1DbaOycbmQ/exec";

  function generateEmail(first, last) {
    return (first + last).toLowerCase() + "@trc.local";
  }

  async function submitForm() {
    const status = document.getElementById("status");
    const first = document.getElementById("firstName").value.trim();
    const last = document.getElementById("lastName").value.trim();
    const password = document.getElementById("password").value;

    // Validation
    if (!first || first.includes(" ")) {
      status.innerHTML = "<span style='color:red'>First name must be one word</span>";
      return;
    }
    if (!last) {
      status.innerHTML = "<span style='color:red'>Last name required</span>";
      return;
    }
    if (password.length < 4 || password.length > 8) {
      status.innerHTML = "<span style='color:red'>Password must be 4-8 characters</span>";
      return;
    }

    const email = generateEmail(first, last);

    // FormData to match your Apps Script e.parameter
    const formData = new FormData();
    formData.append("FIRSTNAME", first);
    formData.append("LASTNAME", last);
    formData.append("EMAIL", email);
    formData.append("PASSWORD", password);

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.result === "success") {
        status.innerHTML = `
          <div style="color:green;">✅ Successfully Registered!</div>
          <div class="success-box">Your Email:<br>${email}</div>
        `;
        // Clear input fields
        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.getElementById("password").value = "";
      } else {
        status.innerHTML = `<span style='color:red'>${data.error || "Error saving data"}</span>`;
      }

    } catch (err) {
      status.innerHTML = "<span style='color:red'>Network error</span>";
      console.error(err);
    }
  }
</script>

</body>
</html>
